<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISBN → Notion</title>
<style>
  :root {
    --bg: #ffffff; --bg2: #f7f6f3; --border: #e5e4e0;
    --text: #1a1a1a; --muted: #666; --radius: 8px; --input-h: 38px;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #1c1c1e; --bg2: #2c2c2e; --border: #3a3a3c; --text: #f2f2f7; --muted: #8e8e93; }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; padding: 1.5rem 1rem; }
  .container { max-width: 600px; margin: 0 auto; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 1.5rem; letter-spacing: -0.3px; }
  h1 span { opacity: 0.4; font-weight: 400; font-size: 14px; margin-left: 8px; }
  .card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: 500; }
  input[type=text], select, textarea { width: 100%; height: var(--input-h); border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg2); color: var(--text); font-size: 14px; padding: 0 10px; font-family: inherit; appearance: none; -webkit-appearance: none; }
  textarea { height: auto; padding: 8px 10px; resize: vertical; line-height: 1.5; }
  input:focus, select:focus, textarea:focus { outline: 2px solid var(--text); outline-offset: 1px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .full { grid-column: 1 / -1; }
  .field { margin-bottom: 10px; }
  button { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; height: 42px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--text); color: var(--bg); font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
  button:hover { opacity: 0.85; }
  button.secondary { background: var(--bg2); color: var(--text); border-color: var(--border); }
  button.outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .isbn-row { display: flex; gap: 8px; margin-bottom: 0.75rem; }
  .isbn-row input { flex: 1; }
  .isbn-row button { width: auto; padding: 0 1rem; flex-shrink: 0; height: var(--input-h); font-size: 13px; }
  .scan-btn { height: var(--input-h); font-size: 13px; background: var(--bg2); color: var(--text); border-color: var(--border); margin-bottom: 1rem; }
  .cover-row { display: flex; gap: 1rem; align-items: flex-start; }
  .cover-img { width: 65px; flex-shrink: 0; border-radius: 4px; border: 1px solid var(--border); }
  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .checkbox-row { display: flex; align-items: center; gap: 8px; }
  .checkbox-row input[type=checkbox] { width: 16px; height: 16px; flex-shrink: 0; accent-color: var(--text); }
  .checkbox-row label { font-size: 13px; color: var(--text); margin: 0; font-weight: 400; cursor: pointer; }
  .result-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; font-size: 13px; font-family: 'Menlo','Courier New',monospace; white-space: pre-wrap; word-break: break-word; line-height: 1.7; margin-bottom: 10px; }
  .status { font-size: 13px; color: var(--muted); padding: 4px 0; min-height: 20px; }
  .source-badge { display: inline-block; font-size: 11px; background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 7px; color: var(--muted); margin-top: 4px; }
  .hidden { display: none; }
  #form-section { display: none; }

  /* Scanner overlay */
  #scanner-overlay {
    display: none;
    position: fixed; inset: 0;
    background: #000;
    z-index: 1000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #scanner-overlay.active { display: flex; }
  #scanner-video { width: 100%; max-width: 500px; border-radius: 0; }
  #scanner-frame {
    position: absolute;
    width: 260px; height: 100px;
    border: 2px solid #fff;
    border-radius: 8px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
  }
  #scanner-frame::before, #scanner-frame::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    border-color: #fff;
    border-style: solid;
  }
  #scanner-frame::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-radius: 6px 0 0 0; }
  #scanner-frame::after { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 6px 0; }
  #scanner-hint { color: #fff; font-size: 14px; margin-top: 2.5rem; opacity: 0.8; text-align: center; padding: 0 2rem; }
  #scanner-close { position: absolute; top: 1.5rem; right: 1.5rem; background: rgba(255,255,255,0.15); border: none; color: #fff; border-radius: 50%; width: 40px; height: 40px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  #scanner-status { color: #fff; font-size: 13px; margin-top: 1rem; min-height: 20px; }
</style>
</head>
<body>

<!-- Scanner overlay -->
<div id="scanner-overlay">
  <button id="scanner-close" onclick="closeScanner()" aria-label="Fermer">✕</button>
  <video id="scanner-video" autoplay playsinline muted></video>
  <div id="scanner-frame"></div>
  <p id="scanner-hint">Centre le code-barres dans le cadre</p>
  <p id="scanner-status"></p>
</div>

<div class="container">
  <h1>ISBN → Notion <span>bibliothèque personnelle</span></h1>

  <div class="card">
    <button class="scan-btn outline" onclick="startScanner()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="8" x2="8" y2="16"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="16" y1="8" x2="16" y2="16"/></svg>
      Scanner un code-barres
    </button>
    <div class="isbn-row">
      <input type="text" id="isbn-input" placeholder="ou saisir l'ISBN manuellement…"
        inputmode="numeric"
        oninput="this.value=this.value.replace(/[^0-9Xx-]/g,'')"
        onkeydown="if(event.key==='Enter')lookup()">
      <button onclick="lookup()">Rechercher</button>
    </div>
    <p id="status" class="status"></p>
  </div>

  <div id="form-section">
    <div class="card">
      <div class="cover-row">
        <img id="cover-img" class="cover-img" src="" alt="Couverture" style="display:none">
        <div style="flex:1">
          <p style="font-size:13px;font-weight:500;line-height:1.4;" id="found-title"></p>
          <span class="source-badge" id="source-badge"></span>
          <p style="font-size:12px;color:var(--muted);margin-top:6px;">Vérifie et modifie les champs si nécessaire.</p>
        </div>
      </div>
    </div>

    <div class="card">
      <p class="section-title">Données bibliographiques</p>
      <div class="grid2">
        <div class="field full"><label>Titre</label><input type="text" id="f-titre"></div>
        <div class="field full"><label>Auteur(s)</label><input type="text" id="f-auteur"></div>
        <div class="field"><label>Éditeur</label><input type="text" id="f-editeur"></div>
        <div class="field"><label>Collection</label><input type="text" id="f-collection-ed"></div>
        <div class="field"><label>Date de publication originale</label><input type="text" id="f-datepub" placeholder="ex. 1739"></div>
        <div class="field"><label>Date de cette édition</label><input type="text" id="f-dateed" placeholder="ex. 2025"></div>
        <div class="field"><label>Nombre de pages</label><input type="text" id="f-pages"></div>
        <div class="field"><label>ISBN</label><input type="text" id="f-isbn" readonly style="opacity:0.5"></div>
      </div>
    </div>

    <div class="card">
      <p class="section-title">Classification thématique</p>
      <div class="grid2">
        <div class="field"><label>Thème</label><select id="f-theme" onchange="updateSousTheme()"></select></div>
        <div class="field"><label>Sous-thème</label><select id="f-soustheme"></select></div>
      </div>
    </div>

    <div class="card">
      <p class="section-title">Statut & lecture</p>
      <div class="grid2">
        <div class="field">
          <label>Statut</label>
          <select id="f-statut" onchange="toggleLu()">
            <option>À lire</option><option>En cours</option><option>Lu</option>
          </select>
        </div>
        <div class="field" id="priorite-block">
          <label>Priorité de lecture</label>
          <select id="f-priorite">
            <option value="">—</option><option>Haute</option><option>Moyenne</option><option>Basse</option>
          </select>
        </div>
        <div class="field hidden" id="datelu-block">
          <label>Date de lecture (mois / année)</label>
          <input type="text" id="f-datelu" placeholder="ex. mars 2024">
        </div>
        <div class="field hidden" id="note-block">
          <label>Note</label>
          <select id="f-note">
            <option value="">—</option>
            <option>★★★★★</option><option>★★★★☆</option><option>★★★☆☆</option><option>★★☆☆☆</option><option>★☆☆☆☆</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <p class="section-title">État physique & collection</p>
      <div class="grid2">
        <div class="field">
          <label>État du livre</label>
          <select id="f-etat">
            <option value="">—</option><option>Neuf</option><option>Très bon</option><option>Bon</option><option>Correct</option><option>Abîmé</option>
          </select>
        </div>
        <div class="field checkbox-row" style="padding-top:22px;">
          <input type="checkbox" id="f-collection">
          <label for="f-collection">Livre de collection</label>
        </div>
        <div class="field full">
          <label>Commentaire</label>
          <textarea id="f-comment" rows="3" placeholder="Notes personnelles…"></textarea>
        </div>
      </div>
    </div>

    <button onclick="generate()" style="margin-bottom:1rem;">Générer le bloc Notion</button>

    <div id="output-section" style="display:none">
      <div class="card">
        <p class="section-title">À coller dans Notion</p>
        <div class="result-box" id="result-text"></div>
        <button class="secondary" onclick="copyResult()" id="copy-btn">Copier</button>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/@zxing/browser@0.1.5/umd/index.min.js"></script>
<script>
const THEMES = {
  "Philosophie": ["Esthétique","Éthique","Épistémologie","Métaphysique","Philosophie politique","Philosophie du langage","Logique","Philosophie des sciences","Histoire de la philosophie","Phénoménologie","Philosophie morale"],
  "Littérature": ["Roman","Nouvelle","Poésie","Théâtre","Essai littéraire","Autobiographie","Correspondance"],
  "Histoire": ["Histoire ancienne","Histoire médiévale","Histoire moderne","Histoire contemporaine","Histoire de France","Biographie","Mémoires"],
  "Sciences sociales": ["Sociologie","Science politique","Économie","Anthropologie","Droit","Géographie"],
  "Sciences": ["Mathématiques","Physique","Biologie","Informatique","Sciences cognitives"],
  "Arts": ["Musique","Peinture","Architecture","Cinéma","Photographie"],
  "Religion & Spiritualité": ["Christianisme","Islam","Bouddhisme","Philosophie orientale","Mystique"],
  "Autre": ["—"]
};

function initThemes() {
  const sel = document.getElementById('f-theme');
  sel.innerHTML = Object.keys(THEMES).map(t => `<option>${t}</option>`).join('');
  updateSousTheme();
}
function updateSousTheme() {
  const t = document.getElementById('f-theme').value;
  document.getElementById('f-soustheme').innerHTML = THEMES[t].map(s => `<option>${s}</option>`).join('');
}
function toggleLu() {
  const lu = document.getElementById('f-statut').value === 'Lu';
  document.getElementById('datelu-block').classList.toggle('hidden', !lu);
  document.getElementById('note-block').classList.toggle('hidden', !lu);
  document.getElementById('priorite-block').classList.toggle('hidden', lu);
}

// ---- SCANNER ----
let codeReader = null;
let scannerStream = null;

async function startScanner() {
  const overlay = document.getElementById('scanner-overlay');
  const video = document.getElementById('scanner-video');
  const scanStatus = document.getElementById('scanner-status');

  // Utilise l'API native BarcodeDetector si dispo (plus rapide sur iOS 17+)
  if ('BarcodeDetector' in window) {
    try {
      const bd = new BarcodeDetector({ formats: ['ean_13', 'ean_8'] });
      scannerStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      video.srcObject = scannerStream;
      overlay.classList.add('active');
      scanStatus.textContent = '';
      scanWithNativeAPI(bd, video, scanStatus);
      return;
    } catch(e) {}
  }

  // Fallback ZXing
  if (typeof ZXingBrowser === 'undefined') {
    scanStatus.textContent = 'Chargement du scanner…';
    overlay.classList.add('active');
    await new Promise(r => setTimeout(r, 800));
  }

  try {
    codeReader = new ZXingBrowser.BrowserMultiFormatReader();
    overlay.classList.add('active');
    scanStatus.textContent = '';
    const devices = await ZXingBrowser.BrowserMultiFormatReader.listVideoInputDevices();
    const backCamera = devices.find(d => /back|rear|environment/i.test(d.label)) || devices[devices.length - 1];
    const deviceId = backCamera?.deviceId;

    codeReader.decodeFromVideoDevice(deviceId, 'scanner-video', (result, err) => {
      if (result) {
        const isbn = result.getText();
        closeScanner();
        document.getElementById('isbn-input').value = isbn;
        lookup();
      }
    });
  } catch(e) {
    document.getElementById('scanner-status').textContent = 'Caméra inaccessible. Saisis l\'ISBN manuellement.';
  }
}

let nativeScanInterval = null;
function scanWithNativeAPI(bd, video, scanStatus) {
  nativeScanInterval = setInterval(async () => {
    if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
    try {
      const barcodes = await bd.detect(video);
      for (const bc of barcodes) {
        if (bc.rawValue && bc.rawValue.length >= 8) {
          clearInterval(nativeScanInterval);
          closeScanner();
          document.getElementById('isbn-input').value = bc.rawValue;
          lookup();
          return;
        }
      }
    } catch(e) {}
  }, 300);
}

function closeScanner() {
  document.getElementById('scanner-overlay').classList.remove('active');
  if (nativeScanInterval) { clearInterval(nativeScanInterval); nativeScanInterval = null; }
  if (codeReader) { try { codeReader.reset(); } catch(e) {} codeReader = null; }
  if (scannerStream) { scannerStream.getTracks().forEach(t => t.stop()); scannerStream = null; }
  const video = document.getElementById('scanner-video');
  video.srcObject = null;
}

// ---- LOOKUP ----
async function lookup() {
  const raw = document.getElementById('isbn-input').value.trim().replace(/[-\s]/g, '');
  if (!raw) return;
  const status = document.getElementById('status');
  status.textContent = 'Recherche en cours…';
  document.getElementById('form-section').style.display = 'none';
  document.getElementById('output-section').style.display = 'none';

  let book = { isbn: raw, titre:'', auteur:'', editeur:'', collection:'', dateed:'', datepub:'', pages:'', couverture:'', source:'' };

  // 1. BnF SRU
  try {
    const bnfUrl = `https://catalogue.bnf.fr/api/SRU?version=1.2&operation=searchRetrieve&query=bib.isbn+adj+"${raw}"&recordSchema=unimarcxchange&maximumRecords=1`;
    const bnfRes = await fetch(bnfUrl);
    const bnfText = await bnfRes.text();
    const xml = new DOMParser().parseFromString(bnfText, 'text/xml');
    if (xml.querySelectorAll('record').length > 0) {
      const rec = xml.querySelectorAll('record')[0];
      const getF = (tag, sub) => { const el = rec.querySelector(`datafield[tag="${tag}"] subfield[code="${sub}"]`); return el ? el.textContent.trim() : ''; };
      const getAllF = (tag, sub) => Array.from(rec.querySelectorAll(`datafield[tag="${tag}"] subfield[code="${sub}"]`)).map(e => e.textContent.trim());
      book.titre = getF('200','a');
      const sub = getF('200','e');
      if (sub && book.titre) book.titre += ' — ' + sub;
      const na = getAllF('700','a'), nb = getAllF('700','b');
      book.auteur = na.map((a,i) => nb[i] ? nb[i]+' '+a : a).join(', ');
      if (!book.auteur) { const na2=getAllF('701','a'),nb2=getAllF('701','b'); book.auteur=na2.map((a,i)=>nb2[i]?nb2[i]+' '+a:a).join(', '); }
      book.editeur = getF('210','c') || getF('214','c');
      book.dateed = getF('210','d') || getF('214','d');
      book.collection = getF('225','a');
      book.pages = getF('215','a');
      if (book.titre) book.source = 'BnF';
    }
  } catch(e) {}

  // 2. OpenLibrary
  if (!book.titre) {
    try {
      const d = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${raw}&format=json&jscmd=details`).then(r=>r.json());
      const entry = d[`ISBN:${raw}`];
      if (entry) {
        const det = entry.details;
        book.titre = det.title || '';
        book.auteur = det.authors?.map(a=>a.name).join(', ') || '';
        book.editeur = det.publishers?.[0] || '';
        book.dateed = det.publish_date || '';
        book.pages = det.number_of_pages || '';
        if (entry.thumbnail_url) book.couverture = entry.thumbnail_url.replace('-S.','-M.');
        if (book.titre) book.source = 'OpenLibrary';
      }
    } catch(e) {}
  }

  // 3. Google Books
  if (!book.titre) {
    try {
      const g = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${raw}`).then(r=>r.json());
      if (g.items?.length) {
        const v = g.items[0].volumeInfo;
        book.titre = v.title || '';
        book.auteur = v.authors?.join(', ') || '';
        book.editeur = v.publisher || '';
        book.dateed = v.publishedDate || '';
        book.pages = v.pageCount || '';
        if (v.imageLinks?.thumbnail) book.couverture = v.imageLinks.thumbnail.replace('http:','https:');
        if (book.titre) book.source = 'Google Books';
      }
    } catch(e) {}
  }

  status.textContent = book.titre ? '' : 'ISBN introuvable — remplis manuellement.';
  fillForm(book);
}

function fillForm(b) {
  document.getElementById('f-titre').value = b.titre || '';
  document.getElementById('f-auteur').value = b.auteur || '';
  document.getElementById('f-editeur').value = b.editeur || '';
  document.getElementById('f-collection-ed').value = b.collection || '';
  document.getElementById('f-isbn').value = b.isbn || '';
  document.getElementById('f-dateed').value = b.dateed || '';
  document.getElementById('f-datepub').value = '';
  document.getElementById('f-pages').value = b.pages || '';
  document.getElementById('found-title').textContent = b.titre || '(titre non trouvé — remplis manuellement)';
  document.getElementById('source-badge').textContent = b.source ? `Source : ${b.source}` : 'Saisie manuelle';
  const img = document.getElementById('cover-img');
  if (b.couverture) { img.src = b.couverture; img.style.display = 'block'; } else { img.style.display = 'none'; }
  document.getElementById('form-section').style.display = 'block';
  document.getElementById('output-section').style.display = 'none';
}

function generate() {
  const get = id => document.getElementById(id)?.value?.trim() || '';
  const checked = id => document.getElementById(id)?.checked || false;
  const lines = [];
  const titre = get('f-titre'); if (titre) lines.push(`📖 ${titre}`);
  const auteur = get('f-auteur'); if (auteur) lines.push(`Auteur : ${auteur}`);
  const editeur = get('f-editeur'); if (editeur) lines.push(`Éditeur : ${editeur}`);
  const coll = get('f-collection-ed'); if (coll) lines.push(`Collection : ${coll}`);
  const datepub = get('f-datepub'); if (datepub) lines.push(`Publication originale : ${datepub}`);
  const dateed = get('f-dateed'); if (dateed) lines.push(`Date édition : ${dateed}`);
  const pages = get('f-pages'); if (pages) lines.push(`Pages : ${pages}`);
  const isbn = get('f-isbn'); if (isbn) lines.push(`ISBN : ${isbn}`);
  lines.push('');
  const theme = get('f-theme'); const sous = get('f-soustheme');
  if (theme) lines.push(`Thème : ${theme}${sous && sous!=='—' ? ' › '+sous : ''}`);
  const statut = get('f-statut'); if (statut) lines.push(`Statut : ${statut}`);
  const prio = get('f-priorite'); if (prio) lines.push(`Priorité : ${prio}`);
  const datelu = get('f-datelu'); if (datelu) lines.push(`Lu en : ${datelu}`);
  const note = get('f-note'); if (note) lines.push(`Note : ${note}`);
  const etat = get('f-etat'); if (etat) lines.push(`État : ${etat}`);
  if (checked('f-collection')) lines.push(`⭐ Livre de collection`);
  const comment = get('f-comment'); if (comment) { lines.push(''); lines.push(`Commentaire : ${comment}`); }
  document.getElementById('result-text').textContent = lines.join('\n');
  document.getElementById('output-section').style.display = 'block';
  document.getElementById('output-section').scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function copyResult() {
  navigator.clipboard.writeText(document.getElementById('result-text').textContent).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ Copié !';
    setTimeout(() => btn.textContent = 'Copier', 2000);
  });
}

initThemes();
</script>
</body>
</html>
